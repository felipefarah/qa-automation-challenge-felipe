name: Tests — Minhas Finanças

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Testes Unitários ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: List directory structure for debugging
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== ExameDesenvolvedorDeTestes ==="
          ls -la ExameDesenvolvedorDeTestes/ || echo "ExameDesenvolvedorDeTestes not found"
          echo "=== API directory ==="
          ls -la ExameDesenvolvedorDeTestes/api/ || echo "API directory not found"
          echo "=== Projects ==="
          find . -name "*.csproj" -type f || echo "No .csproj files found"

      - name: Restore main projects dependencies
        run: |
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Domain/MinhasFinancas.Domain.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Application/MinhasFinancas.Application.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Infrastructure/MinhasFinancas.Infrastructure.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.API/MinhasFinancas.API.csproj

      - name: Build main projects
        run: |
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Domain/MinhasFinancas.Domain.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Application/MinhasFinancas.Application.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Infrastructure/MinhasFinancas.Infrastructure.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.API/MinhasFinancas.API.csproj --no-restore

      - name: Restore unit tests dependencies
        run: dotnet restore tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj

      - name: Build unit tests
        run: dotnet build tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: ./coverage/unit

  # ─── Testes de Integração ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore main projects dependencies
        run: |
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Domain/MinhasFinancas.Domain.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Application/MinhasFinancas.Application.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.Infrastructure/MinhasFinancas.Infrastructure.csproj
          dotnet restore ExameDesenvolvedorDeTestes/api/MinhasFinancas.API/MinhasFinancas.API.csproj

      - name: Build main projects
        run: |
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Domain/MinhasFinancas.Domain.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Application/MinhasFinancas.Application.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.Infrastructure/MinhasFinancas.Infrastructure.csproj --no-restore
          dotnet build ExameDesenvolvedorDeTestes/api/MinhasFinancas.API/MinhasFinancas.API.csproj --no-restore

      - name: Restore integration tests dependencies
        run: dotnet restore tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj

      - name: Build integration tests
        run: dotnet build tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj \
            --no-build \
            --verbosity normal \
            --results-directory ./coverage/integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: ./coverage/integration

  # ─── Testes E2E ───────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start API
        run: |
          cd ExameDesenvolvedorDeTestes/api/MinhasFinancas.API
          dotnet run --urls "http://localhost:5000" &
          echo "Waiting for API to start..."
          sleep 15
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: |
          cd ExameDesenvolvedorDeTestes/web
          bun install

      - name: Start Frontend
        run: |
          cd ExameDesenvolvedorDeTestes/web
          bunx vite --port 5173 &
          echo "Waiting for frontend to start..."
          sleep 10
        env:
          NODE_ENV: development

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd tests/e2e
          npm test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30
