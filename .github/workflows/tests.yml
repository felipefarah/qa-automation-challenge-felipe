name: Tests — Minhas Finanças

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Testes Unitários ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: List directory structure for debugging
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Finding all .csproj files ==="
          find . -name "*.csproj" -type f
          echo "=== ExameDesenvolvedorDeTestes structure ==="
          find ExameDesenvolvedorDeTestes -type f -name "*.csproj" 2>/dev/null || echo "No .csproj files in ExameDesenvolvedorDeTestes"

      - name: Find and restore all main projects
        run: |
          echo "Finding and restoring projects in dependency order..."
          
          # Domain first (no dependencies)
          DOMAIN_PROJ=$(find . -name "MinhasFinancas.Domain.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$DOMAIN_PROJ" ]; then
            echo "Restoring Domain: $DOMAIN_PROJ"
            dotnet restore "$DOMAIN_PROJ"
          else
            echo "Domain project not found"
          fi
          
          # Application (depends on Domain)
          APP_PROJ=$(find . -name "MinhasFinancas.Application.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$APP_PROJ" ]; then
            echo "Restoring Application: $APP_PROJ"
            dotnet restore "$APP_PROJ"
          else
            echo "Application project not found"
          fi
          
          # Infrastructure (depends on Domain and Application)
          INFRA_PROJ=$(find . -name "MinhasFinancas.Infrastructure.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$INFRA_PROJ" ]; then
            echo "Restoring Infrastructure: $INFRA_PROJ"
            dotnet restore "$INFRA_PROJ"
          else
            echo "Infrastructure project not found"
          fi
          
          # API (depends on all)
          API_PROJ=$(find . -name "MinhasFinancas.API.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$API_PROJ" ]; then
            echo "Restoring API: $API_PROJ"
            dotnet restore "$API_PROJ"
          else
            echo "API project not found"
          fi

      - name: Build all main projects
        run: |
          echo "Building projects in dependency order..."
          
          # Domain first
          DOMAIN_PROJ=$(find . -name "MinhasFinancas.Domain.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$DOMAIN_PROJ" ]; then
            echo "Building Domain: $DOMAIN_PROJ"
            dotnet build "$DOMAIN_PROJ" --no-restore
          fi
          
          # Application
          APP_PROJ=$(find . -name "MinhasFinancas.Application.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$APP_PROJ" ]; then
            echo "Building Application: $APP_PROJ"
            dotnet build "$APP_PROJ" --no-restore
          fi
          
          # Infrastructure
          INFRA_PROJ=$(find . -name "MinhasFinancas.Infrastructure.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$INFRA_PROJ" ]; then
            echo "Building Infrastructure: $INFRA_PROJ"
            dotnet build "$INFRA_PROJ" --no-restore
          fi
          
          # API
          API_PROJ=$(find . -name "MinhasFinancas.API.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$API_PROJ" ]; then
            echo "Building API: $API_PROJ"
            dotnet build "$API_PROJ" --no-restore
          fi

      - name: Restore unit tests dependencies
        run: dotnet restore tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj

      - name: Build unit tests
        run: dotnet build tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/unit/MinhasFinancas.Unit.Tests/MinhasFinancas.Unit.Tests.csproj \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: ./coverage/unit

  # ─── Testes de Integração ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Find and restore all main projects
        run: |
          echo "Finding and restoring projects in dependency order..."
          
          # Domain first (no dependencies)
          DOMAIN_PROJ=$(find . -name "MinhasFinancas.Domain.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$DOMAIN_PROJ" ]; then
            echo "Restoring Domain: $DOMAIN_PROJ"
            dotnet restore "$DOMAIN_PROJ"
          fi
          
          # Application (depends on Domain)
          APP_PROJ=$(find . -name "MinhasFinancas.Application.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$APP_PROJ" ]; then
            echo "Restoring Application: $APP_PROJ"
            dotnet restore "$APP_PROJ"
          fi
          
          # Infrastructure (depends on Domain and Application)
          INFRA_PROJ=$(find . -name "MinhasFinancas.Infrastructure.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$INFRA_PROJ" ]; then
            echo "Restoring Infrastructure: $INFRA_PROJ"
            dotnet restore "$INFRA_PROJ"
          fi
          
          # API (depends on all)
          API_PROJ=$(find . -name "MinhasFinancas.API.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$API_PROJ" ]; then
            echo "Restoring API: $API_PROJ"
            dotnet restore "$API_PROJ"
          fi

      - name: Build all main projects
        run: |
          echo "Building projects in dependency order..."
          
          # Domain first
          DOMAIN_PROJ=$(find . -name "MinhasFinancas.Domain.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$DOMAIN_PROJ" ]; then
            echo "Building Domain: $DOMAIN_PROJ"
            dotnet build "$DOMAIN_PROJ" --no-restore
          fi
          
          # Application
          APP_PROJ=$(find . -name "MinhasFinancas.Application.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$APP_PROJ" ]; then
            echo "Building Application: $APP_PROJ"
            dotnet build "$APP_PROJ" --no-restore
          fi
          
          # Infrastructure
          INFRA_PROJ=$(find . -name "MinhasFinancas.Infrastructure.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$INFRA_PROJ" ]; then
            echo "Building Infrastructure: $INFRA_PROJ"
            dotnet build "$INFRA_PROJ" --no-restore
          fi
          
          # API
          API_PROJ=$(find . -name "MinhasFinancas.API.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -1)
          if [ -n "$API_PROJ" ]; then
            echo "Building API: $API_PROJ"
            dotnet build "$API_PROJ" --no-restore
          fi

      - name: Restore integration tests dependencies
        run: dotnet restore tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj

      - name: Build integration tests
        run: dotnet build tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/integration/MinhasFinancas.Integration.Tests/MinhasFinancas.Integration.Tests.csproj \
            --no-build \
            --verbosity normal \
            --results-directory ./coverage/integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: ./coverage/integration

  # ─── Testes E2E ───────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start API
        run: |
          cd ExameDesenvolvedorDeTestes/api/MinhasFinancas.API
          dotnet run --urls "http://localhost:5000" &
          echo "Waiting for API to start..."
          sleep 15
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: |
          cd ExameDesenvolvedorDeTestes/web
          bun install

      - name: Start Frontend
        run: |
          cd ExameDesenvolvedorDeTestes/web
          bunx vite --port 5173 &
          echo "Waiting for frontend to start..."
          sleep 10
        env:
          NODE_ENV: development

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd tests/e2e
          npm test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30